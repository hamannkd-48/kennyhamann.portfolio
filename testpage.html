<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
<style>
#navbar {
  background-color: #333; /* Black background color */
  position: fixed; /* Make it stick/fixed */
  top: 0px; /* Hide the navbar 50px outside of the top view */
  width: 100%; /* Full width */
  transition: top 0.3s; /* Transition effect when sliding down (and up) */
  z-index: 1030; /* Ensure it stays on top of other content */
}

/* Style the navbar links */
#navbar a {
  float: left;
  display: block;
  color: white;
  text-align: center;
  padding: 15px;
  text-decoration: none;
}

.content {background-color:coral;height:2000px;}
</style>

</head>
<body>
    <div id="navbar">
  <a href="#home">Home</a>
  <a href="#news">News</a>
  <a href="#contact">Contact</a>
  <a href="index.html">BACK</a>
</div>
<!-- Add plenty of content below the navbar so the page is scrollable -->
<div class="content">
  <br><br><br><br><br><br><br><br>
</div>

</body>
<script>
var prevScrollpos = window.pageYOffset;
window.onscroll = function() {
  var currentScrollPos = window.pageYOffset;
  if (prevScrollpos > currentScrollPos) {
    // User is scrolling UP, show the navbar
    document.getElementById("navbar").style.top = "0";
  } else {
    // User is scrolling DOWN, hide the navbar
    document.getElementById("navbar").style.top = "-50px"; /* Match the height of the navbar */
  }
  prevScrollpos = currentScrollPos;
}

</script>
</html>
